services:
  # Web Service
  - type: web
    name: dude-ai
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dude-ai-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: PORT
        value: 10000

databases:
  - name: dude-ai-db
    databaseName: dude_ai
    user: dude_ai_user
    plan: free
