<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DUDE — Sign In</title>
  <link rel="stylesheet" href="/css/auth.css"/>
</head>
<body>
  <div class="auth-bg">
    <div class="auth-glow glow-1"></div>
    <div class="auth-glow glow-2"></div>
  </div>

  <div class="auth-container">
    <!-- Logo -->
    <div class="auth-logo">
      <svg width="42" height="42" viewBox="0 0 24 24" fill="none" style="transform: rotate(30deg);">
        <defs>
          <linearGradient id="alg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#DFFF00;stop-opacity:1" />
          </linearGradient>
        </defs>
        <!-- Center circle -->
        <circle cx="12" cy="12" r="4" fill="url(#alg)"/>
        <!-- Rays with different sizes -->
        <line x1="12" y1="1" x2="12" y2="4" stroke="url(#alg)" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="20" x2="12" y2="23" stroke="url(#alg)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="4.22" y1="4.22" x2="6.34" y2="6.34" stroke="url(#alg)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="17.66" y1="17.66" x2="19.78" y2="19.78" stroke="url(#alg)" stroke-width="2" stroke-linecap="round"/>
        <line x1="1" y1="12" x2="4" y2="12" stroke="url(#alg)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="20" y1="12" x2="23" y2="12" stroke="url(#alg)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="4.22" y1="19.78" x2="6.34" y2="17.66" stroke="url(#alg)" stroke-width="2" stroke-linecap="round"/>
        <line x1="17.66" y1="6.34" x2="19.78" y2="4.22" stroke="url(#alg)" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">DUDE</span>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue your conversations</p>

      <!-- Google -->
      <a href="/auth/google" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </a>

      <div class="divider"><span>or</span></div>

      <!-- Error message -->
      <div class="alert alert-error" id="errorMsg" style="display:none"></div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-pw">
            <input type="password" id="password" placeholder="••••••••" required/>
            <button type="button" class="pw-toggle" onclick="togglePw('password')">👁</button>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">
          <span>Sign In</span>
        </button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="/signup">Sign up</a></p>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    fetch('/auth/me').then(r => { if (r.ok) location.href = '/'; });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in…';

      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });

      const data = await res.json();
      if (res.ok) {
        location.href = '/';
      } else {
        err.textContent = data.error;
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<span>Sign In</span>';
      }
    });

    function togglePw(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
